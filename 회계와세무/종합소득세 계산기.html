<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종합소득세 계산기</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-strong: #f1f5fb;
            --border: #d8dee9;
            --text: #162a3a;
            --muted: #5e6d7e;
            --accent: #2f7cff;
            --accent-strong: #1953c8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background: radial-gradient(circle at top, #eef5ff 0%, #f4f7fb 40%, #f4f7fb 100%);
            color: var(--text);
            line-height: 1.55;
        }

        .page {
            width: min(100%, 1080px);
            margin: 0 auto;
            padding: 16px;
        }

        .hero {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #ffffff 0%, #eef4ff 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(16, 64, 128, 0.06);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            max-width: 720px;
            font-size: 0.9rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .input-group {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            background: var(--surface-strong);
            color: var(--text);
        }

        .muted {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .print-btn {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--accent);
            border-radius: 10px;
            font-size: 0.95rem;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .print-btn:hover {
            background: var(--accent-strong);
            border-color: var(--accent-strong);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .stat {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat.emph {
            background: #f7fbff;
            border-color: rgba(47, 124, 255, 0.18);
            box-shadow: 0 0 0 1px rgba(47, 124, 255, 0.14) inset;
        }

        .stat .name {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat .value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat.emph .name {
            color: var(--accent-strong);
        }

        .stat.emph .value {
            color: var(--accent-strong);
            font-size: 1.4rem;
        }

        .section {
            margin-top: 20px;
        }

        .section-title {
            margin: 0 0 12px;
            font-size: 1.1rem;
            letter-spacing: -0.03em;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 8px 10px;
            border: 1px solid var(--border);
            text-align: left;
        }

        th {
            background: #f1f6ff;
            color: var(--text);
            font-weight: 700;
            font-size: 0.85rem;
        }

        tbody tr:nth-child(even) {
            background: #f9fbff;
        }

        .note {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.85rem;
        }

        @media (max-width: 720px) {
            .page {
                padding: 12px;
            }

            .hero,
            .card {
                padding: 14px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            @page {
                size: A4;
                margin: 0.5cm;
            }

            body {
                margin: 0;
                background: white !important;
                color: #000 !important;
                font-size: 12px;
                line-height: 1.3;
            }

            .page {
                width: auto;
                margin: 0;
                padding: 0;
                max-width: none;
            }

            .hero,
            .card,
            .stat {
                border-color: #ccc !important;
                box-shadow: none !important;
                background: white !important;
                margin-bottom: 8px;
                padding: 12px;
            }

            .hero h1 {
                font-size: 16px;
            }

            .hero p {
                font-size: 10px;
            }

            .card {
                padding: 14px;
            }

            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                margin-top: 12px;
            }

            .stat {
                padding: 8px;
            }

            .stat .name {
                font-size: 10px;
                margin-bottom: 4px;
            }

            .stat .value {
                font-size: 14px;
            }

            .stat.emph .value {
                font-size: 16px;
            }

            .section {
                margin-top: 16px;
                page-break-inside: avoid;
            }

            .section-title {
                font-size: 12px;
                margin-bottom: 8px;
            }

            table {
                font-size: 9px;
                page-break-inside: avoid;
            }

            th,
            td {
                padding: 6px 8px;
            }

            .note {
                font-size: 9px;
                margin-top: 8px;
            }

            input[type="text"] {
                display: none;
            }

            button {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <section class="hero">
            <h1>종합소득세 계산기</h1>
            <p>종합소득금액을 입력하여 세액을 계산하세요 (2023년 세율 적용)</p>
        </section>

        <section class="card">
            <div class="input-group">
                <div class="field">
                    <label for="incomeInput">종합소득금액</label>
                    <input id="incomeInput" type="text" inputmode="numeric" placeholder="예: 80000000" autocomplete="off">
                </div>
                <button id="printButton" class="print-btn">인쇄하기</button>
            </div>

            <div class="stats-grid">
                <div class="stat">
                    <div class="name">과세표준</div>
                    <div id="taxBase" class="value">0원</div>
                </div>
                <div class="stat">
                    <div class="name">국세(소득세)</div>
                    <div id="nationalTax" class="value">0원</div>
                </div>
                <div class="stat">
                    <div class="name">지방소득세</div>
                    <div id="localTax" class="value">0원</div>
                </div>
                <div class="stat emph">
                    <div class="name">총세액</div>
                    <div id="totalTax" class="value">0원</div>
                </div>
                <div class="stat">
                    <div class="name">한계세율</div>
                    <div id="marginalRate" class="value">0%</div>
                </div>
                <div class="stat">
                    <div class="name">실효세율</div>
                    <div id="effectiveRate" class="value">0%</div>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">세율표 (누진공제 포함)</h2>
            <table>
                <thead>
                    <tr>
                        <th>과세표준 구간</th>
                        <th>세율</th>
                        <th>누진공제</th>
                    </tr>
                </thead>
                <tbody id="bracketBody"></tbody>
            </table>
            <div class="note">산출세액 = 과세표준 × 세율 − 누진공제</div>
        </section>
    </div>

    <script>
        const TAX_BRACKETS = [
            { limit: 14000000, rate: 0.06, quick: 0 },
            { limit: 50000000, rate: 0.15, quick: 1260000 },
            { limit: 88000000, rate: 0.24, quick: 5760000 },
            { limit: 150000000, rate: 0.35, quick: 15440000 },
            { limit: 300000000, rate: 0.38, quick: 19940000 },
            { limit: 500000000, rate: 0.40, quick: 25940000 },
            { limit: 1000000000, rate: 0.42, quick: 35940000 },
            { limit: Infinity, rate: 0.45, quick: 65940000 },
        ];

        const el = {
            incomeInput: document.getElementById('incomeInput'),
            taxBase: document.getElementById('taxBase'),
            nationalTax: document.getElementById('nationalTax'),
            localTax: document.getElementById('localTax'),
            totalTax: document.getElementById('totalTax'),
            marginalRate: document.getElementById('marginalRate'),
            effectiveRate: document.getElementById('effectiveRate'),
            bracketBody: document.getElementById('bracketBody'),
            printButton: document.getElementById('printButton'),
        };

        function formatKRW(value) {
            const n = Number.isFinite(value) ? Math.round(value) : 0;
            return n.toLocaleString('ko-KR') + '원';
        }

        function formatPercent(value) {
            const n = Number.isFinite(value) ? value : 0;
            return n.toFixed(2).replace(/\.00$/, '') + '%';
        }

        function parseCurrency(input) {
            if (!input) return 0;
            const digits = String(input).replace(/[^0-9]/g, '');
            if (digits.length === 0) return 0;
            return Number(digits);
        }

        function countDigitsLeft(str, caretIndex) {
            let count = 0;
            const len = Math.max(0, Math.min(caretIndex ?? 0, str.length));
            for (let i = 0; i < len; i++) {
                const c = str.charCodeAt(i);
                if (c >= 48 && c <= 57) count++;
            }
            return count;
        }

        function caretIndexFromDigitCount(formattedStr, digitCount) {
            if (!formattedStr || digitCount <= 0) return 0;
            let seen = 0;
            for (let i = 0; i < formattedStr.length; i++) {
                const c = formattedStr.charCodeAt(i);
                if (c >= 48 && c <= 57) {
                    seen++;
                    if (seen === digitCount) return i + 1;
                }
            }
            return formattedStr.length;
        }

        function getBracketFor(base) {
            for (const bracket of TAX_BRACKETS) {
                if (base <= bracket.limit) return bracket;
            }
            return TAX_BRACKETS[TAX_BRACKETS.length - 1];
        }

        function computeNationalTax(base) {
            const bracket = getBracketFor(base);
            const raw = base * bracket.rate - bracket.quick;
            return Math.max(0, Math.floor(raw + 0.5));
        }

        function renderBracketTable() {
            el.bracketBody.innerHTML = TAX_BRACKETS.map((b, i) => {
                const lowerLimit = i === 0 ? 0 : TAX_BRACKETS[i - 1].limit;
                const upper = Number.isFinite(b.limit) ? b.limit : null;
                const lowerLabel = i === 0 ? lowerLimit.toLocaleString('ko-KR') : `${lowerLimit.toLocaleString('ko-KR')} 초과`;
                const rangeText = upper ? `${lowerLabel} ~ ${upper.toLocaleString('ko-KR')}` : `${lowerLabel}`;
                return `<tr><td>${rangeText}</td><td>${(b.rate * 100).toFixed(0)}%</td><td>${b.quick.toLocaleString('ko-KR')}원</td></tr>`;
            }).join('');
        }

        function update(ev) {
            const inputEl = el.incomeInput;
            let digitsLeft = null;
            if (ev && ev.target === inputEl) {
                digitsLeft = countDigitsLeft(inputEl.value, inputEl.selectionStart);
            }

            const base = parseCurrency(inputEl.value);
            const formatted = base === 0 ? '' : base.toLocaleString('ko-KR');
            inputEl.value = formatted;
            if (digitsLeft !== null) {
                const newCaret = caretIndexFromDigitCount(formatted, digitsLeft);
                inputEl.setSelectionRange(newCaret, newCaret);
            }

            const national = computeNationalTax(base);
            const local = Math.round(national * 0.10);
            const total = national + local;
            const bracket = getBracketFor(base);

            const eff = base > 0 ? (total / base) * 100 : 0;
            const marginal = (bracket.rate * 100);

            el.taxBase.textContent = formatKRW(base);
            el.nationalTax.textContent = formatKRW(national);
            el.localTax.textContent = formatKRW(local);
            el.totalTax.textContent = formatKRW(total);
            el.marginalRate.textContent = formatPercent(marginal);
            el.effectiveRate.textContent = formatPercent(eff);
        }

        renderBracketTable();
        el.incomeInput.addEventListener('input', update);
        el.printButton.addEventListener('click', () => window.print());
        update();
    </script>
</body>

</html>
