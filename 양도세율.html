<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양도소득세 상세 계산기</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 25px;
            color: #111827;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #374151;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: border-color 0.2s;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .helper-text {
            text-align: right;
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 6px;
            min-height: 1.2em;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        /* 결과 영역 스타일 */
        .result-box {
            margin-top: 30px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1rem;
        }

        .result-row:last-of-type {
            border-bottom: none;
        }
        
        .total-row {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px dashed #cbd5e1 !important;
        }

        .row-label { color: #4b5563; }
        .row-value { font-weight: 600; color: #1f2937; }

        .total-row .row-label { font-weight: 700; color: #111827; }
        .total-row .row-value { font-size: 1.4rem; font-weight: 800; color: var(--primary-dark); }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            background-color: #dbeafe;
            color: #1e40af;
            font-size: 0.75rem;
            margin-left: 5px;
            vertical-align: middle;
        }

        /* 상세 계산 내역 박스 */
        .calculation-detail {
            margin-top: 20px;
            background-color: #fffbeb;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            padding: 15px;
            color: #92400e;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .detail-title {
            font-weight: 700;
            margin-bottom: 5px;
            display: block;
            color: #b45309;
        }
        .detail-formula {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h1>양도소득세 계산기</h1>

    <div class="form-group">
        <label for="assetType">1. 자산 종류 및 보유 기간 선택</label>
        <select id="assetType">
            <option value="">-- 상황을 선택해주세요 --</option>
            
            <optgroup label="[주택 / 조합입주권]">
                <option value="house_1y">1년 미만 보유 (70%)</option>
                <option value="house_2y">1년 ~ 2년 보유 (60%)</option>
                <option value="house_basic">2년 이상 보유 (기본세율)</option>
            </optgroup>
            
            <optgroup label="[분양권]">
                <option value="right_1y">1년 미만 보유 (70%)</option>
                <option value="right_over1y">1년 이상 보유 (60%)</option>
            </optgroup>

            <optgroup label="[토지 - 일반(사업용)]">
                <option value="land_1y">1년 미만 (50%)</option>
                <option value="land_2y">1년 ~ 2년 (40%)</option>
                <option value="basic">2년 이상 (기본세율)</option>
            </optgroup>

            <optgroup label="[토지 - 비사업용 (중과)]">
                <option value="land_nb_1y">1년 미만 (50%)</option>
                <option value="land_nb_2y">1년 ~ 2년 (40%)</option>
                <option value="land_nb_basic">2년 이상 (기본세율 + 10%)</option>
            </optgroup>

            <optgroup label="[일반 건물]">
                <option value="build_1y">1년 미만 (50%)</option>
                <option value="build_2y">1년 ~ 2년 (40%)</option>
                <option value="basic">2년 이상 (기본세율)</option>
            </optgroup>

            <optgroup label="[주식 - 국내]">
                <option value="stock_sme_minor">중소기업 소액주주 (10%)</option>
                <option value="stock_sme_major">중소기업 대주주 (누진: 20~25%)</option>
                <option value="stock_gen_minor">일반법인 소액주주 (20%)</option>
                <option value="stock_gen_major_short">일반법인 대주주 1년 미만 (30%)</option>
                <option value="stock_gen_major_long">일반법인 대주주 1년 이상 (누진: 20~25%)</option>
            </optgroup>

            <optgroup label="[주식 - 국외]">
                <option value="stock_foreign_sme">국외 중소기업 (10%)</option>
                <option value="stock_foreign_gen">국외 일반 (20%)</option>
            </optgroup>
        </select>
    </div>

    <div class="form-group">
        <label for="taxBase">2. 과세표준 금액 (양도차익 - 기본공제)</label>
        <input type="text" id="taxBase" placeholder="예: 50,000,000" onkeyup="formatNumber(this)">
        <div class="helper-text" id="koreanReadout">0원</div>
    </div>

    <button onclick="calculateTax()">세금 계산하기</button>

    <div class="result-box" id="resultBox">
        <div class="result-row">
            <span class="row-label">적용 세율 <span id="rateBadge" class="badge"></span></span>
            <span class="row-value" id="res_rate"></span>
        </div>
        <div class="result-row">
            <span class="row-label">① 양도소득세</span>
            <span class="row-value" id="res_main_tax">0원</span>
        </div>
        <div class="result-row">
            <span class="row-label">② 지방소득세 (10%)</span>
            <span class="row-value" id="res_local_tax">0원</span>
        </div>
        <div class="result-row total-row">
            <span class="row-label">총 납부세액 (①+②)</span>
            <span class="row-value" id="res_total_tax">0원</span>
        </div>
        
        <!-- 상세 계산 내역 영역 -->
        <div class="calculation-detail" id="calcDetailBox">
            <span class="detail-title">📝 양도소득세 계산 내역</span>
            <span class="detail-formula" id="calcExpression"></span>
        </div>
    </div>
</div>

<script>
    // 기본 누진세율표
    const basicTaxBrackets = [
        { limit: 14000000, rate: 0.06, deduction: 0 },
        { limit: 50000000, rate: 0.15, deduction: 1260000 },
        { limit: 88000000, rate: 0.24, deduction: 5760000 },
        { limit: 150000000, rate: 0.35, deduction: 15440000 },
        { limit: 300000000, rate: 0.38, deduction: 19940000 },
        { limit: 500000000, rate: 0.40, deduction: 25940000 },
        { limit: 1000000000, rate: 0.42, deduction: 35940000 },
        { limit: Infinity, rate: 0.45, deduction: 65940000 }
    ];

    function formatNumber(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        if (value === '') {
            input.value = '';
            document.getElementById('koreanReadout').innerText = '0원';
            return;
        }
        const num = parseInt(value, 10);
        input.value = num.toLocaleString();
        document.getElementById('koreanReadout').innerText = readNumber(num) + ' 원';
    }

    function readNumber(num) {
        if(num == 0) return '0';
        const units = ['', '만', '억', '조'];
        let result = '';
        let unitIndex = 0;
        
        while (num > 0) {
            const part = num % 10000;
            if (part > 0) {
                result = part.toLocaleString() + units[unitIndex] + ' ' + result;
            }
            num = Math.floor(num / 10000);
            unitIndex++;
        }
        return result.trim();
    }

    // 기본세율(누진) 계산 함수
    function getBasicTax(amount) {
        let bracket = basicTaxBrackets.find(b => amount <= b.limit);
        let tax = (amount * bracket.rate) - bracket.deduction;
        return { 
            tax: Math.floor(tax), 
            rate: bracket.rate,
            deduction: bracket.deduction,
            rateStr: `기본(${(bracket.rate*100).toFixed(0)}%)` 
        };
    }

    function calculateTax() {
        const assetType = document.getElementById('assetType').value;
        const inputStr = document.getElementById('taxBase').value.replace(/,/g, '');
        
        if (assetType === "") {
            alert("자산 종류를 선택해주세요.");
            return;
        }
        if (!inputStr) {
            alert("과세표준 금액을 입력해주세요.");
            return;
        }

        const base = parseInt(inputStr, 10);
        let mainTax = 0;
        let rateDisplay = "";
        let calcExpression = ""; // 계산 식 문자열

        // 포맷팅 헬퍼
        const fmt = (n) => n.toLocaleString();

        switch(assetType) {
            // [단일 세율 그룹]
            case 'house_1y': case 'right_1y': 
                mainTax = base * 0.70; rateDisplay = "70%";
                calcExpression = `${fmt(base)}원 × 70% = ${fmt(mainTax)}원`;
                break;
            case 'house_2y': case 'right_over1y':
                mainTax = base * 0.60; rateDisplay = "60%";
                calcExpression = `${fmt(base)}원 × 60% = ${fmt(mainTax)}원`;
                break;
            case 'land_1y': case 'land_nb_1y': case 'build_1y':
                mainTax = base * 0.50; rateDisplay = "50%";
                calcExpression = `${fmt(base)}원 × 50% = ${fmt(mainTax)}원`;
                break;
            case 'land_2y': case 'land_nb_2y': case 'build_2y':
                mainTax = base * 0.40; rateDisplay = "40%";
                calcExpression = `${fmt(base)}원 × 40% = ${fmt(mainTax)}원`;
                break;
            case 'stock_sme_minor': case 'stock_foreign_sme':
                mainTax = base * 0.10; rateDisplay = "10%";
                calcExpression = `${fmt(base)}원 × 10% = ${fmt(mainTax)}원`;
                break;
            case 'stock_gen_minor': case 'stock_foreign_gen':
                mainTax = base * 0.20; rateDisplay = "20%";
                calcExpression = `${fmt(base)}원 × 20% = ${fmt(mainTax)}원`;
                break;
            case 'stock_gen_major_short':
                mainTax = base * 0.30; rateDisplay = "30%";
                calcExpression = `${fmt(base)}원 × 30% = ${fmt(mainTax)}원`;
                break;

            // [기본 누진세율 그룹]
            case 'house_basic': case 'basic':
                const res = getBasicTax(base);
                mainTax = res.tax;
                rateDisplay = res.rateStr;
                // 예: 15,000,000원 × 15% - 1,260,000원 = 990,000원
                calcExpression = `${fmt(base)}원 × ${(res.rate*100).toFixed(0)}% - ${fmt(res.deduction)}원(누진공제) = ${fmt(mainTax)}원`;
                break;

            // [비사업용 토지 중과: 기본 + 10%]
            case 'land_nb_basic':
                const basicRes = getBasicTax(base);
                const addTax = base * 0.10;
                mainTax = basicRes.tax + addTax;
                rateDisplay = "기본 + 10%";
                calcExpression = `[${fmt(base)}원 × ${(basicRes.rate*100).toFixed(0)}% - ${fmt(basicRes.deduction)}원(기본세액)] + [${fmt(base)}원 × 10%(추가)] = ${fmt(mainTax)}원`;
                break;

            // [주식 누진: 3억 기준]
            case 'stock_sme_major': case 'stock_gen_major_long':
                const threshold = 300000000;
                if (base <= threshold) {
                    mainTax = base * 0.20;
                    rateDisplay = "20% (누진)";
                    calcExpression = `${fmt(base)}원 × 20% = ${fmt(mainTax)}원`;
                } else {
                    const tax1 = threshold * 0.20;
                    const tax2 = (base - threshold) * 0.25;
                    mainTax = tax1 + tax2;
                    rateDisplay = "20~25% (누진)";
                    calcExpression = `(3억원 × 20%) + (${fmt(base - threshold)}원 × 25%) = ${fmt(mainTax)}원`;
                }
                break;
        }

        // 결과 합산
        mainTax = Math.floor(mainTax);
        const localTax = Math.floor(mainTax * 0.10);
        const totalTax = mainTax + localTax;

        // 화면 표시
        document.getElementById('rateBadge').innerText = rateDisplay;
        document.getElementById('res_rate').innerText = ""; 
        document.getElementById('res_main_tax').innerText = mainTax.toLocaleString() + '원';
        document.getElementById('res_local_tax').innerText = localTax.toLocaleString() + '원';
        document.getElementById('res_total_tax').innerText = totalTax.toLocaleString() + '원';
        
        // 상세 내역 표시
        document.getElementById('calcExpression').innerText = calcExpression;

        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
