
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일괄 조정료 청구서 생성기 – 대한세무법인</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2340;
    --navy-mid: #2c3a5c;
    --gold: #b8962e;
    --gold-light: #d4b86a;
    --panel-bg: #f0ece4;
    --font-main: 'Malgun Gothic', '맑은 고딕', sans-serif;
  }

  body { font-family: 'Noto Sans KR', sans-serif; background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  /* UI 요소 */
  .topbar { width: 100%; background: var(--navy-mid); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; color: white; }
  .controls { background: var(--panel-bg); padding: 20px; width: 100%; max-width: 1150px; margin: 20px; border-radius: 10px; display: flex; gap: 20px; align-items: flex-end; }
  .btn-action { background: var(--gold); color: #fff; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-weight: 500; transition: 0.2s; }
  .btn-action:hover { background: var(--gold-light); }
  .instruction { color: #ddd; font-size: 13px; margin-bottom: 20px; }
  
  .individual-download { margin-bottom: 12px; text-align: right; width: 210mm; }
  .btn-download-single { 
    background: #e67e22; 
    color: #fff; 
    border: none; 
    padding: 8px 18px; 
    border-radius: 4px; 
    cursor: pointer; 
    font-size: 13px; 
    font-weight: 500;
  }

  /* 문서 영역 */
  .preview-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 80px; }

  /* ── DOCUMENT 규격 (빈 페이지 방지를 위해 높이 미세 조정) ── */
  .doc-wrapper { display: flex; flex-direction: column; align-items: center; page-break-after: always; }
  .doc-wrapper:last-child { page-break-after: auto; }

  .doc {
    width: 210mm; 
    height: 296.5mm; /* 297mm에서 0.5mm 줄여서 안전권 확보 */
    background: #fff; 
    padding: 0 20mm; 
    font-family: var(--font-main); 
    color: #000; 
    line-height: 1.8; 
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .doc-inner { width: 100%; }
  .doc-header { text-align: center; margin-bottom: 15px; }
  .doc-corp-name { font-size: 30px; font-weight: 700; letter-spacing: 0.5em; margin-bottom: 5px; }
  .doc-addr { font-size: 9.5px; color: #000; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
  
  .meta-table { width: 100%; border-collapse: collapse; }
  .meta-table td { padding: 5px 0; vertical-align: top; font-size: 11pt; }
  .meta-table .lbl { font-weight: 700; width: 65px; white-space: nowrap; } 
  .meta-table .val { padding-left: 5px; font-weight: 700; }

  .title-underline { border-bottom: 2px solid #000; margin: 10px 0 40px 0; }
  .greeting { font-size: 11pt; margin-bottom: 30px; word-break: keep-all; }
  
  .bill-box { border: 0.5pt solid #000; padding: 20px 25px; margin: 25px 0; background: #fff; }
  .bill-row { display: flex; justify-content: flex-start; gap: 5px; font-size: 11pt; margin-bottom: 10px; }
  .bill-row:last-child { margin-bottom: 0; }
  .bill-row .bl { font-weight: 700; min-width: 65px; } 
  .bill-row .bv { padding-left: 5px; font-weight: 700; }

  .account-info { margin-top: 25px; font-size: 11pt; line-height: 2.0; font-weight: 700; }
  .sig-contact-wrap { margin-top: 50px; line-height: 2.0; font-size: 11pt; }
  .sig-manager-line { display: block; font-weight: 700; }
  .sig-date { font-size: 14pt; text-align: center; margin: 60px 0 30px; letter-spacing: 2px; }
  
  .sig-footer { display: flex; justify-content: center; align-items: center; margin-top: 20px; }
  .sig-name { font-size: 28px; font-weight: 700; letter-spacing: 0.1em; text-align: center; }

  @media print {
    @page { size: A4; margin: 0; }
    body { background: white; padding: 0 !important; margin: 0 !important; }
    .topbar, .controls, .instruction, .individual-download { display: none !important; }
    .preview-area { padding: 0 !important; margin: 0 !important; gap: 0 !important; }
    .doc { box-shadow: none !important; border: none !important; margin: 0 !important; height: 297mm; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="font-size: 18px; font-weight: 700;">대한세무법인 일괄 청구서 생성기</div>
  <button class="btn-action" onclick="printFullPDF()">전체 PDF 개별저장 </button>
</div>

<div class="controls">
  <div style="flex: 1;">
    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 700;">1. 엑셀 파일 업로드 (.xlsx)</label>
    <input type="file" id="excelInput" accept=".xlsx, .xls" style="width: 100%;">
  </div>
  <div style="flex: 1;">
    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 700;">2. 양식 다운로드</label>
    <button class="btn-action" style="background: #444;" onclick="downloadSample()">샘플 엑셀 다운로드</button>
  </div>
</div>

<div class="instruction">
  * 엑셀 컬럼명: <b>수신자, 귀속연도, 수수료종류, 회사명, 금액, 담당자, 연락처, 발행날짜</b>
</div>

<div class="preview-area" id="printArea">
  <div style="color: #666; margin-top: 100px; text-align: center;">엑셀 파일을 업로드하면 청구서가 자동으로 생성됩니다.</div>
</div>

<script>
document.getElementById('excelInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});
    const sheetName = workbook.SheetNames[0];
    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
    const validRows = rows.filter(row => row.수신자 && row.수신자.toString().trim() !== "");
    generateBills(validRows);
  };
  reader.readAsArrayBuffer(file);
});

function generateBills(data) {
  const container = document.getElementById('printArea');
  container.innerHTML = ''; 

  data.forEach((row, index) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'doc-wrapper';
    
    const companyName = row.회사명 || '상호명미상';
    const formattedAmt = Number(row.금액 || 0).toLocaleString();
    const formattedDate = row.발행날짜 || new Date().toLocaleDateString().replace(/-/g, '. ');
    const feeSubject = (row.수수료종류 || '').split(' ')[0] || '세무';

    const btnContainer = document.createElement('div');
    btnContainer.className = 'individual-download';
    btnContainer.innerHTML = `<button class="btn-download-single" onclick="saveSinglePDF(${index}, '${companyName}', '${row.귀속연도 || ''}', '${row.수수료종류 || ''}')">PDF 저장 (${companyName})</button>`;
    
    const doc = document.createElement('div');
    doc.className = 'doc';
    doc.id = 'doc-' + index;
    
    doc.innerHTML = `
      <div class="doc-inner">
        <div class="doc-header">
          <div class="doc-corp-name">대  한  세  무  법  인</div>
          <div class="doc-addr">경기도 성남시 분당구 성남대로 912, 515호(야탑동, BYC빌딩) (우13506) / TEL:031-783-8877 / FAX:031-783-8871</div>
        </div>
        <table class="meta-table">
          <tr><td class="lbl">수 신 자 :</td><td class="val">${row.수신자 || ''}</td></tr>
          <tr><td class="lbl">제&nbsp;&nbsp;&nbsp;&nbsp;목 :</td><td class="val">${row.귀속연도 || ''}년 귀속 ${row.수수료종류 || '세무조정료'} 청구 안내</td></tr>
        </table>
        <div class="title-underline"></div>
        <div class="greeting">
          귀사의 무궁한 발전을 번창을 기원합니다.<br>
          변함없이 성원해 주신데 대해 진심으로 감사드립니다.<br><br>
          ${row.귀속연도 || ''}년 귀속에 대한 ${feeSubject} 신고가 완료되어 아래와 같이 수수료를 청구하오니,<br>
          확인 하신 후 입금 부탁드립니다.
        </div>
        <div class="bill-box">
          <div class="bill-row"><span class="bl">회 사 명 :</span><span class="bv">${companyName}</span></div>
          <div class="bill-row"><span class="bl">${row.수수료종류 || ''} :</span><span class="bv">${formattedAmt}원 (부가세 포함)</span></div>
        </div>
        <div class="account-info">
          송금계좌 : <strong>기업은행 341-057820-01-014</strong><br>
          예 금 주 : <strong>대한세무법인</strong>
        </div>
        <div class="sig-contact-wrap">
          <span class="thanks">확인 하신 후 문의사항 있으시면 연락바랍니다. 감사합니다.</span>
          <span class="sig-manager-line">담당자 : <strong>${row.담당자 || ''}</strong> &nbsp;&nbsp;&nbsp;&nbsp; 연락처 : <strong>${row.연락처 || ''}</strong></span>
        </div>
        <div class="sig-date">${formattedDate}</div>

function saveSinglePDF(index, companyName, year, feetype) {
  const element = document.getElementById('doc-' + index);
  const opt = {
    margin: 0,
    filename: `${year}_${feetype}_청구서_${companyName}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { 
      scale: 3, 
      useCORS: true, 
      logging: false,
      scrollY: 0, 
      scrollX: 0
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };
  
  // PDF 생성 실행
  html2pdf().set(opt).from(element).save();
}

async function printFullPDF() {
  const docs = document.querySelectorAll('.doc');
  if (docs.length === 0) { alert('생성된 청구서가 없습니다.'); return; }

  for (let i = 0; i < docs.length; i++) {
    const doc = docs[i];
    const titleEl = doc.querySelectorAll('.val')[1];
    let year = '', feetype = '', companyName = '';
    if (titleEl) {
      const match = titleEl.textContent.match(/(\d{4})년 귀속 (.+?) 청구/);
      if (match) { year = match[1]; feetype = match[2]; }
    }
    const companyEl = doc.querySelector('.bv');
    if (companyEl) companyName = companyEl.textContent.trim();

    const filename = `${year}_${feetype}_청구서_${companyName}.pdf`;
    const opt = {
      margin: 0,
      filename: filename,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 3, useCORS: true, logging: false, scrollY: 0, scrollX: 0 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };
    await html2pdf().set(opt).from(doc).save();
  }
}
